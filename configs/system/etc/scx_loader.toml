default_sched = "scx_lavd"
default_mode = "Powersave"

[scheds.scx_tickless]
auto_mode = []
gaming_mode = ["-f", "5000", "-s", "5000"]
lowlatency_mode = ["-f", "5000", "-s", "1000"]
powersave_mode = ["-f", "50"]
server_mode = ["-f", "100"]

[scheds.scx_flash]
auto_mode = []
gaming_mode = ["-m", "all"]
lowlatency_mode = ["-m", "performance", "-w", "-C", "0"]
powersave_mode = ["-m", "powersave", "-I", "10000", "-t", "10000", "-s", "10000", "-S", "1000"]
server_mode = ["-m", "all", "-s", "20000", "-S", "1000", "-I", "-1", "-D", "-L"]

[scheds.scx_lavd]
# LAVD: Optimized for Ryzen AI 7 350 (Shared 16MB L3 CCX)
# ACPI highest_perf: 4,6(208) | 0,8(202) | 2,10(196) | E-cores(135)
auto_mode = [
    "--autopower",
    "--cpu-pref-order", "4,6,0,2,1,3,5,7,12,14,8,10,9,11,13,15",
    "--lb-low-util-pct", "15"
]
gaming_mode = [
    "--performance",
    "--cpu-pref-order", "4,6,0,2,12,14,8,10,1,3,5,7,9,11,13,15",
    "--lb-low-util-pct", "0"
]
balanced_mode = [
    "--balanced",
    "--cpu-pref-order", "4,6,0,2,1,3,5,7,12,14,8,10,9,11,13,15",
    "--lb-low-util-pct", "25"
]
powersave_mode = [
    "--powersave",
    "--cpu-pref-order", "1,3,5,7,9,11,13,15,4,6,0,2,12,14,8,10",
    "--lb-low-util-pct", "85"
]
lowlatency_mode = []
server_mode = []

[scheds.scx_cosmos]
auto_mode = ["-s", "20000", "-d", "-c", "0", "-p", "0"]
gaming_mode = ["-c", "0", "-p", "0"]
lowlatency_mode = ["-m", "performance", "-c", "0", "-p", "0", "-w"]
powersave_mode = ["-m", "powersave", "-d", "-p", "5000"]
server_mode = ["-s", "20000"]

[scheds.scx_rustland]
# Optimized for your installed version (1.1.x)
auto_mode = []
gaming_mode = ["-s", "10000"]
lowlatency_mode = ["-s", "5000"]
powersave_mode = ["-s", "50000"]
server_mode = []

[scheds.scx_bpfland]
auto_mode = ["-m", "all", "-f", "--preferred-idle-scan"]
lowlatency_mode = ["-m", "performance", "-f", "-s", "500", "--idle-resume-us", "100"]
powersave_mode = ["-m", "powersave", "-f", "--preferred-idle-scan"]
server_mode = ["-s", "20000", "-S"]

[scheds.scx_p2dq]
# The "Set and Forget" Master Profile for Zen 5
# Pick-2 with PELT-based EAS (Energy-Aware Scheduling)
auto_mode = ["--enable-eas=true", "--enable-pelt=true", "--hw-auto-optimize=true"]
gaming_mode = [
    "--sched-mode", "performance", 
    "--task-slice=true", 
    "--cpu-priority=true",
    "--hw-auto-optimize=true"
]
lowlatency_mode = ["-y", "-f", "--task-slice=true"]
powersave_mode = ["--sched-mode", "efficiency", "--enable-eas=true", "--enable-pelt=true"]
server_mode = ["--keep-running"]

[scheds.scx_rusty]
auto_mode = []
gaming_mode = ["--perf", "1024", "--fifo-sched"]
lowlatency_mode = []
powersave_mode = ["--perf", "0"]
server_mode = []
