<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Force system-ui to use Noto Sans -->
  <match target="pattern">
    <test name="family" compare="eq">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans</string>
    </edit>
  </match>

  <!-- Prepend Noto Sans Thai for web UI and document fonts -->
  <alias binding="same"><family>Segoe UI</family><prefer><family>Noto Sans Thai</family></prefer></alias>
  <alias binding="same"><family>Segoe UI Historic</family><prefer><family>Noto Sans Thai</family></prefer></alias>
  <alias binding="same"><family>Helvetica</family><prefer><family>Noto Sans Thai</family></prefer></alias>
  <alias binding="same"><family>Arial</family><prefer><family>Noto Sans Thai</family></prefer></alias>
  <alias binding="same"><family>TH Sarabun New</family><prefer><family>Noto Sans Thai</family></prefer></alias>
  <alias binding="same"><family>TH SarabunPSK</family><prefer><family>Noto Sans Thai</family></prefer></alias>
  <alias binding="same"><family>Sarabun</family><prefer><family>Noto Sans Thai</family></prefer></alias>
</fontconfig>
