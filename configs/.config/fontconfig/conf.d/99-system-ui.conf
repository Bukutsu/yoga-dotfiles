<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Force system-ui to use Noto Sans -->
  <match target="pattern">
    <test name="family" compare="eq">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans</string>
    </edit>
  </match>

  <!-- Fix Thai fallback for common web UI fonts (Segoe UI, Helvetica, Arial) -->
  <match target="pattern">
    <test name="family" compare="contains">
      <string>Segoe UI</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans Thai</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq">
      <string>Helvetica</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans Thai</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq">
      <string>Arial</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans Thai</string>
    </edit>
  </match>

  <!-- Alias TH Sarabun and print Thai fonts to Noto Sans Thai -->
  <match target="pattern">
    <test name="family" compare="eq">
      <string>TH Sarabun New</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans Thai</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq">
      <string>TH SarabunPSK</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans Thai</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq">
      <string>Sarabun</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans Thai</string>
    </edit>
  </match>
</fontconfig>
