[als.iio]
path = "/sys/bus/iio/devices"
thresholds = { 0 = "night", 20 = "dark", 80 = "dim", 250 = "normal", 500 = "bright", 800 = "outdoors" }

[[output.backlight]]
name = "eDP-1"
path = "/sys/class/backlight/amdgpu_bl1"
capturer = "none"
# ponytail: capturer = "wayland" works on niri (wlr-screencopy), switch if you want screen-content-aware brightness too

[[keyboard]]
name = "keyboard-yoga"
path = "/sys/class/leds/platform::kbd_backlight"
