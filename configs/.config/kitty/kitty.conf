font_family JetBrainsMono Nerd Font Mono
font_size 11

cursor_shape beam

select_by_word_characters @-./_~?&=%+#
select_by_word_characters_forward @-./_~?&=%+#,

background_opacity 0.85
dynamic_background_opacity yes
background_blur 10

cursor_trail 100
cursor_trail_decay 0.2 0.4

map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+n new_tab
map ctrl+up scroll_line_up
map ctrl+down scroll_line_down
map ctrl+page_up scroll_page_up
map ctrl+page_down scroll_page_down
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab -1

include current-theme.conf
