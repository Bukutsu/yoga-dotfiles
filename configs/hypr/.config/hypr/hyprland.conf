# Keybind-only port of ~/.config/niri/config.kdl
# Hyprland compositor options intentionally left at defaults.

$mod = SUPER

# Auto-rotate the laptop display from iio-sensor-proxy.
exec-once = iio-hyprland

# Focus and move
bind = $mod, left,  movefocus, l
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u
bind = $mod, right, movefocus, r
bind = $mod, h,     movefocus, l
bind = $mod, j,     movefocus, d
bind = $mod, k,     movefocus, u
bind = $mod, l,     movefocus, r
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, h,     movewindow, l
bind = $mod SHIFT, j,     movewindow, d
bind = $mod SHIFT, k,     movewindow, u
bind = $mod SHIFT, l,     movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, previous
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Previous/next workspace
bind = $mod CTRL, left,  workspace, -1
bind = $mod CTRL, down,  workspace, +1
bind = $mod CTRL, up,    workspace, -1
bind = $mod CTRL, right, workspace, +1
bind = $mod CTRL, h,     workspace, -1
bind = $mod CTRL, j,     workspace, +1
bind = $mod CTRL, k,     workspace, -1
bind = $mod CTRL, l,     workspace, +1
bind = $mod CTRL SHIFT, left,  movetoworkspace, -1
bind = $mod CTRL SHIFT, down,  movetoworkspace, +1
bind = $mod CTRL SHIFT, up,    movetoworkspace, -1
bind = $mod CTRL SHIFT, right, movetoworkspace, +1
bind = $mod CTRL SHIFT, h,     movetoworkspace, -1
bind = $mod CTRL SHIFT, j,     movetoworkspace, +1
bind = $mod CTRL SHIFT, k,     movetoworkspace, -1
bind = $mod CTRL SHIFT, l,     movetoworkspace, +1

# Monitors
bind = $mod ALT, left,  focusmonitor, l
bind = $mod ALT, down,  focusmonitor, d
bind = $mod ALT, up,    focusmonitor, u
bind = $mod ALT, right, focusmonitor, r
bind = $mod ALT, h,     focusmonitor, l
bind = $mod ALT, j,     focusmonitor, d
bind = $mod ALT, k,     focusmonitor, u
bind = $mod ALT, l,     focusmonitor, r
bind = $mod ALT SHIFT, left,  movecurrentworkspacetomonitor, l
bind = $mod ALT SHIFT, down,  movecurrentworkspacetomonitor, d
bind = $mod ALT SHIFT, up,    movecurrentworkspacetomonitor, u
bind = $mod ALT SHIFT, right, movecurrentworkspacetomonitor, r
bind = $mod ALT SHIFT, h,     movecurrentworkspacetomonitor, l
bind = $mod ALT SHIFT, j,     movecurrentworkspacetomonitor, d
bind = $mod ALT SHIFT, k,     movecurrentworkspacetomonitor, u
bind = $mod ALT SHIFT, l,     movecurrentworkspacetomonitor, r

# Windows
bind = $mod, Q, killactive
bind = $mod, M, fullscreen
bind = $mod, F11, fullscreen
bind = $mod, G, togglefloating
bind = $mod, Y, togglefloating
bind = $mod, S, layoutmsg, settab
bind = $mod, X, layoutmsg, swapnext
bind = ALT, Tab, cyclenext
bind = $mod, Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev
bind = $mod SHIFT, Tab, cyclenext, prev

# Resize submap
bind = $mod, R, submap, resize
submap = resize
bind = , h, resizeactive, -10 0
bind = , j, resizeactive, 0 10
bind = , k, resizeactive, 0 -10
bind = , l, resizeactive, 10 0
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# Noctalia and system
bind = $mod, A, exec, noctalia msg panel-toggle launcher
bind = $mod, slash, exec, noctalia msg panel-toggle launcher
bind = $mod, space, exec, noctalia msg panel-toggle launcher
bind = $mod, comma, exec, noctalia msg settings-toggle
bind = $mod, escape, exec, loginctl lock-session
bind = $mod SHIFT, escape, exec, loginctl terminate-session $XDG_SESSION_ID

# Applications
bind = $mod, T, exec, alacritty
bind = $mod, F, exec, dolphin
bind = $mod, B, exec, xdg-open about:blank
bind = $mod ALT, S, exec, orca

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%FT%H%M%S).png

# Media and power
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay,         exec, playerctl play-pause
bind = , XF86AudioPrev,         exec, playerctl previous
bind = , XF86AudioNext,         exec, playerctl next
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = , XF86PowerOff,          exec, systemctl poweroff
